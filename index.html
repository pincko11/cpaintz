<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="description" content="个人二创画师灵感随机工具">
<link rel="manifest" href="manifest.json">
<title>Cpaintz</title>
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: #F5F0E8;
  color: #1a1a1a;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ========== NAVIGATION ========== */
nav {
  background: #1a1a1a;
  color: #F5F0E8;
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
nav .brand {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #C9A94E;
}
nav .brand-c {
  font-family: "Georgia", "Times New Roman", serif;
  font-size: 27px;
  font-weight: 900;
  font-style: italic;
}
nav .brand-paintz {
  font-family: "Brush Script MT", "Georgia", "Times New Roman", cursive;
  font-size: 19px;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.5px;
}
nav .nav-links {
  display: flex;
  gap: 4px;
}
nav .nav-links button, nav .sound-btn {
  background: none;
  border: 1px solid transparent;
  color: #AA9F8E;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}
nav .nav-links button.active { color: #C9A94E; border-color: #C9A94E; }
nav .nav-links button:hover { color: #F5F0E8; }
nav .sound-btn {
  font-size: 20px;
  padding: 4px 8px;
  color: #AA9F8E;
}
nav .sound-btn:hover { color: #F5F0E8; }

/* ========== MODULE TABS ========== */
.module-tabs {
  display: flex;
  gap: 12px;
  justify-content: center;
  padding: 16px;
  flex-shrink: 0;
}
.module-tabs button {
  padding: 10px 32px;
  border-radius: 24px;
  border: 2px solid #1a1a1a;
  background: transparent;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 600;
  letter-spacing: 1px;
}
.module-tabs button.m1 { color: #8B6914; border-color: #8B6914; }
.module-tabs button.m1.active { background: #8B6914; color: #F5F0E8; }
.module-tabs button.m2 { color: #6B1D2F; border-color: #6B1D2F; }
.module-tabs button.m2.active { background: #6B1D2F; color: #F5F0E8; }

/* ========== PAGES ========== */
.page { display: none; flex: 1; overflow-y: auto; padding-bottom: 32px; }
.page.visible { display: block; }

/* ========== DIMENSION TAGS (Module 1) ========== */
.dim-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 16px 16px;
  justify-content: center;
}
.dim-tag {
  padding: 6px 14px;
  border-radius: 16px;
  border: 2px solid #C9A94E;
  background: transparent;
  color: #8B6914;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.dim-tag.selected { background: #C9A94E; color: #1a1a1a; }

/* ========== EMOTION SLIDER (Module 2) ========== */
.emotion-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px 16px;
  justify-content: center;
}
.emotion-bar label { font-size: 13px; color: #6B1D2F; white-space: nowrap; }
.emotion-bar input[type="range"] {
  -webkit-appearance: none;
  width: 200px;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(to right, #F5E6D3, #8B2E4A);
  outline: none;
}
.emotion-bar input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #8B2E4A;
  cursor: pointer;
  border: 2px solid #F5F0E8;
}

/* ========== SERIES FILTER (Module 2) ========== */
.series-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 0 16px 16px;
  justify-content: center;
}
.series-tag {
  padding: 4px 12px;
  border-radius: 12px;
  border: 1.5px solid #6B1D2F;
  background: transparent;
  color: #6B1D2F;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.series-tag.selected { background: #6B1D2F; color: #F5F0E8; }

/* ========== CARD GRID ========== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  padding: 0 16px;
  max-width: 900px;
  margin: 0 auto;
}
@media (max-width: 640px) {
  .card-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 10px; }
  nav .nav-links button { padding: 4px 8px; font-size: 12px; }
  .module-tabs button { padding: 8px 20px; font-size: 14px; }
}

/* ========== CARD FLIP ========== */
.card-wrapper { perspective: 800px; }
.card-inner {
  position: relative;
  width: 100%;
  padding-bottom: 150%; /* 2:3 ratio */
  transform-style: preserve-3d;
  transition: transform 0.6s ease;
  cursor: pointer;
}
.card-inner.flipped { transform: rotateY(180deg); }
.m1-card .card-inner.locked { box-shadow: 0 0 0 5px #C9A94E; border-radius: 8px; }
.m2-card .card-inner.locked { box-shadow: 0 0 0 5px #8B2E4A; border-radius: 8px; }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 8px;
  overflow: hidden;
}
.card-back-img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 8px;
}
.card-front {
  transform: rotateY(180deg);
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px;
}
.card-front .card-tag {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
}
.card-front .card-word {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  line-height: 1.4;
  word-break: break-all;
}
@media (max-width: 640px) {
  .card-front .card-word { font-size: 16px; }
}

/* Module 1 colors */
.m1-card .card-front .card-word { color: #C9A94E; }
/* Module 2 colors */
.m2-card .card-front .card-word { color: #E8D5D0; }

/* ========== BUTTONS ========== */
.btn-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  padding: 20px 16px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 24px;
  border-radius: 20px;
  border: none;
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}
.btn-primary { background: #8B6914; color: #F5F0E8; }
.btn-primary:active { background: #6B4F0E; }
.btn-secondary { background: #6B1D2F; color: #F5F0E8; }
.btn-secondary:active { background: #4D1522; }
.btn-outline { background: transparent; border: 2px solid #1a1a1a; color: #1a1a1a; }
.btn-outline:active { background: rgba(0,0,0,0.05); }
.btn-danger { background: transparent; border: 2px solid #C0392B; color: #C0392B; }
.btn-danger:active { background: rgba(192,57,43,0.1); }

/* ========== FAVORITES ========== */
.fav-groups { display: flex; flex-direction: column; gap: 24px; padding: 16px; max-width: 800px; margin: 0 auto; }
.fav-group { border-radius: 12px; background: rgba(255,255,255,0.5); padding: 16px; }
.fav-group h3 { font-size: 16px; margin-bottom: 12px; color: #5C4B3A; }
.fav-item {
  background: #FFF;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  cursor: grab;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: box-shadow 0.2s, opacity 0.2s;
}
.fav-item:active { cursor: grabbing; }
.fav-item.dragging { opacity: 0.4; }
.drag-insert-line {
  height: 3px; background: #C9A94E; border-radius: 2px;
  margin: 2px 0; animation: pulse 0.6s ease infinite;
}
.fav-item .fav-info { flex: 1; }
.fav-item .fav-words { font-size: 13px; color: #1a1a1a; }
.fav-item .fav-meta { font-size: 11px; color: #999; margin-top: 4px; }
.fav-item .fav-notes { font-size: 12px; color: #666; font-style: italic; margin-top: 4px; }
.fav-item .fav-actions { display: flex; gap: 6px; flex-shrink: 0; }
.fav-item .fav-actions button {
  background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px;
}
.fav-move-menu {
  position: absolute; right: 8px; top: 36px;
  background: #FFF; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  z-index: 50; overflow: hidden; min-width: 130px;
}
.fav-move-menu button {
  display: block; width: 100%; padding: 10px 16px; border: none;
  background: none; font-size: 13px; cursor: pointer; text-align: left;
  white-space: nowrap;
}
.fav-move-menu button:hover { background: #F5F0E8; }
.fav-move-menu button.current { color: #BBB; pointer-events: none; }
.fav-item { position: relative; }
.fav-group .drop-hint {
  text-align: center; color: #AAA; font-size: 12px; padding: 12px;
  border: 2px dashed #DDD; border-radius: 8px;
}

/* ========== HISTORY ========== */
.history-list { padding: 16px; max-width: 800px; margin: 0 auto; }
.history-item {
  background: #FFF;
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.history-item .hist-info { flex: 1; cursor: pointer; }
.history-item .hist-words { font-size: 13px; }
.history-item .hist-meta { font-size: 11px; color: #999; margin-top: 4px; }

/* ========== SETTINGS ========== */
.settings-page { padding: 24px 16px; max-width: 600px; margin: 0 auto; }
.setting-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 0; border-bottom: 1px solid #E0D8CC;
}
.setting-item label { font-size: 15px; }
.setting-item input[type="checkbox"] {
  width: 44px; height: 26px; -webkit-appearance: none;
  background: #CCC; border-radius: 13px; position: relative; cursor: pointer;
  transition: background 0.3s;
}
.setting-item input[type="checkbox"]::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 20px; height: 20px; border-radius: 50%; background: #FFF;
  transition: left 0.3s;
}
.setting-item input[type="checkbox"]:checked { background: #8B6914; }
.setting-item input[type="checkbox"]:checked::after { left: 21px; }
.copyright {
  margin-top: 32px; padding: 16px; font-size: 12px; color: #999;
  text-align: center; line-height: 1.8;
}

/* ========== CUSTOM DICT MODAL ========== */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: #F5F0E8; border-radius: 16px; padding: 24px;
  max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
}
.modal h2 { font-size: 20px; margin-bottom: 16px; }
.modal textarea {
  width: 100%; height: 120px; border: 2px solid #DDD; border-radius: 8px;
  padding: 12px; font-size: 14px; resize: vertical; font-family: inherit;
}
.modal .dim-select { margin: 12px 0; }
.modal .dim-select select {
  padding: 8px 12px; border-radius: 8px; border: 2px solid #DDD; font-size: 14px; width: 100%;
}
.modal .parsed-words {
  display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0;
}
.modal .parsed-word {
  display: flex; align-items: center; gap: 4px;
  background: #E8E0D0; padding: 4px 10px; border-radius: 12px; font-size: 13px;
}
.modal .parsed-word button {
  background: none; border: none; cursor: pointer; font-size: 14px; color: #999;
}
.modal .parsed-word.custom { background: #D4C8A0; }
.modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ========== SHARE MODAL ========== */
.share-modal .share-canvas-wrap { text-align: center; margin: 16px 0; }
.share-modal canvas { max-width: 100%; border-radius: 8px; }

/* ========== ANIMATIONS ========== */
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
@keyframes redrawPulse {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.4); }
}
.card-inner.redrawing { animation: redrawPulse 0.35s ease; }

/* ========== TOAST ========== */
.toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  background: #1a1a1a; color: #F5F0E8; padding: 10px 24px;
  border-radius: 20px; font-size: 14px; z-index: 300;
  animation: fadeInOut 2s ease forwards;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  85% { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>
<body>

<!-- ========== NAVIGATION ========== -->
<nav>

    <button data-page="settings">设置</button>

</nav>

<!-- ========== MODULE TABS ========== -->
<div class="module-tabs" id="moduleTabs">

  <button class="m2" data-module="2">同人二创</button>
</div>

<!-- ========== HOME PAGE ========== -->
<div class="page visible" id="page-home">
  <!-- Module 1 -->
  <div id="m1Section">
    <div class="dim-tags" id="dimTags"></div>

      <button class="btn btn-outline" id="m2Save">⭐ 收藏结果</button>
      <button class="btn btn-outline" id="m2Unlock">🔓 一键解锁</button>
      <button class="btn btn-outline" id="m2Share">📤 分享卡片</button>
    </div>
  </div>
</div>

<!-- ========== FAVORITES PAGE ========== -->
<div class="page" id="page-favorites">
  <div class="fav-groups" id="favGroups"></div>
</div>

<!-- ========== HISTORY PAGE ========== -->
<div class="page" id="page-history">
  <div class="history-list" id="historyList"></div>
</div>

<!-- ========== SETTINGS PAGE ========== -->
<div class="page" id="page-settings">
  <div class="settings-page">
    <div class="setting-item">
      <label>音效开关</label>
      <input type="checkbox" id="settingSound" checked>
    </div>
    <div class="setting-item">
      <label>自定义词库</label>
      <button class="btn btn-outline" id="openDictBtn">管理自定义词库 →</button>
    </div>
    <div class="copyright">
      本工具仅供个人创作灵感参考，请尊重原作版权及二创生态，禁止将生成内容用于商业用途。
    </div>
  </div>
</div>

<!-- ========== SHARE MODAL ========== -->
<div class="modal-overlay share-modal" id="shareModal">
  <div class="modal">
    <h2>分享卡片</h2>
    <div class="share-canvas-wrap"><canvas id="shareCanvas"></canvas></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="shareClose">关闭</button>
      <button class="btn btn-primary" id="shareSave">保存图片</button>
    </div>
  </div>
</div>

<!-- ========== CUSTOM DICT MODAL ========== -->
<div class="modal-overlay" id="dictModal">
  <div class="modal">
    <h2>自定义词库</h2>
    <div class="dim-select">
      <select id="dictModule"><option value="1">原创人设</option><option value="2">同人二创</option></select>
    </div>
    <div class="dim-select">
      <select id="dictDim"></select>
    </div>
    <textarea id="dictPaste" placeholder="粘贴词条，用换行、逗号、顿号或空格分隔&#10;例如：&#10;双马尾&#10;刺猬短发,遮眼长刘海&#10;蓬松卷发、丸子头"></textarea>
    <div class="btn-row" style="padding:8px 0;"><button class="btn btn-outline" id="dictParse">识别词条</button></div>
    <div class="parsed-words" id="dictParsed"></div>
    <div class="btn-row" style="padding:8px 0;">
      <button class="btn btn-primary" id="dictSave">保存到词库</button>
      <button class="btn btn-outline" id="dictReset">恢复默认词库</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="dictClose">关闭</button>
    </div>
  </div>
</div>

<!-- ========== AUDIO ELEMENTS ========== -->
<audio id="audioFlip" preload="auto" src="assets/sounds/card-flip.wav"></audio>

function loadState() {
  try {
    const saved = localStorage.getItem('cpaintz_state');
    if (saved) {
      const s = JSON.parse(saved);
      state.soundEnabled = s.soundEnabled !== undefined ? s.soundEnabled : true;
      state.m1Dims = s.m1Dims || [...M1_DIM_NAMES];
      state.m2Emotion = s.m2Emotion || 50;
      state.m2Series = s.m2Series || [];
      state.favorites = s.favorites || { '待画清单': [], '已完成': [], '灵感存档': [] };
      state.history = s.history || [];
      state.customDict = s.customDict || { module1: {}, module2: {} };
      // reset transient state
      state.m1Results = {}; state.m1Locks = {}; state.m1Flipped = {};
      state.m2Results = {}; state.m2Locks = {}; state.m2Flipped = {};
    }
  } catch(e) { /* ignore */ }
}

function saveState() {
  try {
    localStorage.setItem('cpaintz_state', JSON.stringify({
      soundEnabled: state.soundEnabled,
      m1Dims: state.m1Dims,
      m2Emotion: state.m2Emotion,
      m2Series: state.m2Series,
      favorites: state.favorites,
      history: state.history,
      customDict: state.customDict
    }));
  } catch(e) { /* ignore */ }
}

// ============================================================
//  HELPERS
// ============================================================

function randomPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getWords(dim, module) {
  const dictKey = module === 1 ? 'module1' : 'module2';
  const custom = (state.customDict[dictKey][dim] || []);
  const defaults = (DEFAULT_DICT[dictKey][dim] || []);
  if (typeof defaults === 'object' && !Array.isArray(defaults)) {
    // nested (情境)
    const allDefaults = Object.values(defaults).flat();
    return [...allDefaults, ...custom];
  }
  return [...defaults, ...custom];
}

function getSituationWords() {
  const defaults = DEFAULT_DICT.module2['情境'];
  const custom = state.customDict.module2['情境'] || [];
  const love = [...defaults.love, ...custom];
  const family = [...defaults.family, ...custom];
  const friend = [...defaults.friend, ...custom];
  const stranger = [...defaults.stranger, ...custom];
  return { love, family, friend, stranger };
}

function weightedSituation(emotion) {
  const words = getSituationWords();
  // emotion 0 = 轻松治愈 → weight love/family/friend/stranger
  // emotion 100 = 戏剧张力 → weight stranger/family
  let pool = [];
  if (emotion < 33) {
    pool = [...words.love, ...words.love, ...words.family, ...words.friend, ...words.friend, ...words.stranger];
  } else if (emotion < 66) {
    pool = [...words.love, ...words.family, ...words.family, ...words.friend, ...words.stranger, ...words.stranger];
  } else {
    pool = [...words.love, ...words.family, ...words.friend, ...words.stranger, ...words.stranger, ...words.stranger];
  }
  return randomPick(pool);
}

function playSound(name) {
  if (!state.soundEnabled) return;
  const el = document.getElementById(name === 'flip' ? 'audioFlip' : 'audioRedraw');
  if (el) { el.currentTime = 0; el.play().catch(() => {}); }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2100);
}

function formatTime(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function drawModule1() {
  state.m1Results = {};
  state.m1Locks = {};
  state.m1Flipped = {};
  state.m1Dims.forEach(dim => {
    const words = getWords(dim, 1);
    state.m1Results[dim] = words.length > 0 ? randomPick(words) : '（词库为空）';
  });
}

function renderModule1() {
  // Dim tags
  const tagContainer = document.getElementById('dimTags');
  tagContainer.innerHTML = M1_DIM_NAMES.map(dim => {
    const sel = state.m1Dims.includes(dim);
    return `<button class="dim-tag${sel ? ' selected' : ''}" data-dim="${dim}">${dim}</button>`;
  }).join('');

  // Cards
  const grid = document.getElementById('m1Cards');
  if (Object.keys(state.m1Results).length === 0) drawModule1();

  grid.innerHTML = state.m1Dims.map(dim => {
    const word = state.m1Results[dim] || '';
    const flipped = state.m1Flipped[dim];
    const locked = state.m1Locks[dim];
    return `
    <div class="card-wrapper m1-card" data-dim="${dim}">
      <div class="card-inner${flipped ? ' flipped' : ''}${locked ? ' locked' : ''}" data-dim="${dim}">
        <div class="card-face card-back">
          <img class="card-back-img" src="assets/images/module1-card-back.webp" alt="卡背" draggable="false">
        </div>
        <div class="card-face card-front">
          <span class="card-tag">${dim}</span>
          <span class="card-word">${word}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('m1Actions').style.display = 'flex';
}

function getAvailableCharacters() {
  const selectedSeries = state.m2Series.length > 0 ? state.m2Series : Object.keys(CHARACTERS);
  let all = [];
  selectedSeries.forEach(s => {
    const data = CHARACTERS[s];
    if (!data) return;
    all = all.concat(data.single.map(c => ({ name: c, series: s, type: 'single' })));
    all = all.concat(data.cp.map(c => ({ name: c, series: s, type: 'cp' })));
  });
  return all;
}

function drawModule2() {
  state.m2Results = {};
  state.m2Locks = {};
  state.m2Flipped = {};
  // Character
  const chars = getAvailableCharacters();
  state.m2Results['角色'] = chars.length > 0 ? randomPick(chars) : { name: '（无可用角色）', series: '', type: 'single' };

  // Situation
  state.m2Results['情境'] = weightedSituation(state.m2Emotion);
}

  const grid = document.getElementById('m2Cards');
  if (Object.keys(state.m2Results).length === 0) drawModule2();

  grid.innerHTML = M2_CARD_TYPES.map(type => {
    const result = state.m2Results[type];
    let word = '';
    let tag = type;
    if (type === '角色' && result && typeof result === 'object') {
      word = result.name;
      tag = result.series || type;
    } else {
      word = result || '';
    }
    const flipped = state.m2Flipped[type];
    const locked = state.m2Locks[type];
    return `
    <div class="card-wrapper m2-card" data-type="${type}">
      <div class="card-inner${flipped ? ' flipped' : ''}${locked ? ' locked' : ''}" data-type="${type}">
        <div class="card-face card-back">
          <img class="card-back-img" src="assets/images/module2-card-back.webp" alt="卡背" draggable="false">
        </div>
        <div class="card-face card-front">
          <span class="card-tag">${tag}</span>
          <span class="card-word">${word}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('m2Actions').style.display = 'flex';
}

function renderFavorites() {

function favItemSummary(item) {
  if (!item.results) return '';
  if (item.module === 1) {
    return Object.values(item.results).join(' · ');
  } else {
    const r = item.results;
    const charName = r['角色'] && typeof r['角色'] === 'object' ? r['角色'].name : (r['角色'] || '');
    return `${charName} · ${r['错位年代'] || ''} · ${r['错位地点'] || ''} · ${r['情境'] || ''}`;
  }
}

function setupFavDrag() {
  let dragData = null;

  document.querySelectorAll('.fav-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragData = { id: item.dataset.id, group: item.dataset.group };
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', JSON.stringify(dragData));
    });
    item.addEventListener('dragend', () => {
      document.querySelectorAll('.fav-item').forEach(el => el.classList.remove('dragging'));
      document.querySelectorAll('.drag-insert-line').forEach(el => el.remove());
      dragData = null;
    });
  });

  document.querySelectorAll('.fav-items').forEach(zone => {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (!dragData) return;
      // Calculate insertion index based on cursor position
      const items = Array.from(zone.querySelectorAll('.fav-item:not(.dragging)'));
      document.querySelectorAll('.drag-insert-line').forEach(el => el.remove());

      if (items.length === 0) return; // will append

      let insertIdx = items.length;
      for (let i = 0; i < items.length; i++) {
        const rect = items[i].getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        if (e.clientY < midY) { insertIdx = i; break; }
      }

      // Show insertion indicator
      const line = document.createElement('div');
      line.className = 'drag-insert-line';
      if (insertIdx < items.length) {
        items[insertIdx].before(line);
      } else {
        zone.appendChild(line);
      }
    });

    zone.addEventListener('drop', e => {
      e.preventDefault();
      document.querySelectorAll('.drag-insert-line').forEach(el => el.remove());
      if (!dragData) return;

      const targetGroup = zone.dataset.group;
      const { id, group: srcGroup } = dragData;
      if (!state.favorites[srcGroup]) return;

      const srcIdx = state.favorites[srcGroup].findIndex(i => i.id === id);
      if (srcIdx === -1) return;
      const item = state.favorites[srcGroup][srcIdx];

      // Calculate target insertion index
      const items = Array.from(zone.querySelectorAll('.fav-item'));
      let insertIdx = items.length;
      // Re-query items since DOM may have changed
      const currentItems = Array.from(zone.querySelectorAll('.fav-item'));
      const nonDragging = currentItems.filter(el => !el.classList.contains('dragging'));

      if (nonDragging.length > 0) {
        insertIdx = nonDragging.length;
        for (let i = 0; i < nonDragging.length; i++) {
          const rect = nonDragging[i].getBoundingClientRect();
          const midY = rect.top + rect.height / 2;
          if (e.clientY < midY) { insertIdx = i; break; }
        }
      }

      // Remove from source
      state.favorites[srcGroup].splice(srcIdx, 1);

      // If source and target are the same, adjust insertIdx
      if (srcGroup === targetGroup && srcIdx < insertIdx) {
        insertIdx--;
      }

      // Insert at target position
      if (!state.favorites[targetGroup]) state.favorites[targetGroup] = [];
      state.favorites[targetGroup].splice(insertIdx, 0, item);

      saveState();
      renderFavorites();
      const action = srcGroup === targetGroup ? '已排序' : `已移动到「${targetGroup}」`;
      showToast(action);
      dragData = null;
    });

    zone.addEventListener('dragleave', e => {
      // Only remove line if actually leaving the zone
      if (!zone.contains(e.relatedTarget)) {
        document.querySelectorAll('.drag-insert-line').forEach(el => el.remove());
      }
    });
  });
}

function renderHistory() {
  const container = document.getElementById('historyList');
  if (state.history.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#AAA;">暂无历史记录</div>';
    return;
  }
  container.innerHTML = state.history.map((item, idx) => `
    <div class="history-item">

        <div class="hist-words">${favItemSummary(item)}</div>
        <div class="hist-meta">${formatTime(item.ts)} · 模块${item.module === 1 ? '一' : '二'}</div>
      </div>
      <button class="hist-del-btn" data-idx="${idx}" style="background:none;border:none;cursor:pointer;font-size:18px;">🗑️</button>
    </div>
  `).join('');
}

//  ACTIONS
// ============================================================

function flipCard(module, key) {
  if (module === 1) {
    state.m1Flipped[key] = true;
  } else {
    state.m2Flipped[key] = true;
  }
  playSound('flip');
  renderCurrentModule();
}

function redrawCard(module, key) {
  if (module === 1) {
    if (state.m1Locks[key]) return;
    const words = getWords(key, 1);
    state.m1Results[key] = words.length > 0 ? randomPick(words) : '（词库为空）';
  } else {
    if (state.m2Locks[key]) return;
    if (key === '角色') {
      const chars = getAvailableCharacters();
      state.m2Results[key] = chars.length > 0 ? randomPick(chars) : { name: '（无可用角色）', series: '', type: 'single' };
    } else if (key === '情境') {
      state.m2Results[key] = weightedSituation(state.m2Emotion);
    } else {
      const words = getWords(key, 2);
      state.m2Results[key] = words.length > 0 ? randomPick(words) : '（词库为空）';
    }
  }
  playSound('redraw');
  renderCurrentModule();
}

function toggleLock(module, key) {
  if (module === 1) {
    state.m1Locks[key] = !state.m1Locks[key];
    if (!state.m1Locks[key] && !state.m1Flipped[key]) {
      // unlocking: ensure flipped state is consistent
    }
  } else {
    state.m2Locks[key] = !state.m2Locks[key];
  }
  const status = (module === 1 ? state.m1Locks[key] : state.m2Locks[key]) ? '已锁定' : '已解锁';
  showToast(status);
  renderCurrentModule();
}

function renderCurrentModule() {
  if (state.module === 1) renderModule1();
  else renderModule2();
}

function refreshAll(module) {
  if (module === 1) {
    state.m1Dims.forEach(dim => {
      if (!state.m1Locks[dim]) {
        const words = getWords(dim, 1);
        state.m1Results[dim] = words.length > 0 ? randomPick(words) : '（词库为空）';
        state.m1Flipped[dim] = false;
      }
    });
  } else {
    M2_CARD_TYPES.forEach(type => {
      if (!state.m2Locks[type]) {
        if (type === '角色') {
          const chars = getAvailableCharacters();
          state.m2Results[type] = chars.length > 0 ? randomPick(chars) : { name: '（无可用角色）', series: '', type: 'single' };
        } else if (type === '情境') {
          state.m2Results[type] = weightedSituation(state.m2Emotion);
        } else {
          const words = getWords(type, 2);
          state.m2Results[type] = words.length > 0 ? randomPick(words) : '（词库为空）';
        }
        state.m2Flipped[type] = false;
      }
    });
  }
  playSound('redraw');
  renderCurrentModule();
}

function unlockAll(module) {
  if (module === 1) {
    Object.keys(state.m1Locks).forEach(k => delete state.m1Locks[k]);
  } else {
    Object.keys(state.m2Locks).forEach(k => delete state.m2Locks[k]);
  }
  showToast('已全部解锁');
  renderCurrentModule();
}

function saveToHistory() {
  const results = state.module === 1 ? state.m1Results : state.m2Results;
  const entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    module: state.module,
    results: JSON.parse(JSON.stringify(results)),
    ts: Date.now()
  };
  state.history.unshift(entry);
  if (state.history.length > 20) state.history = state.history.slice(0, 20);
  saveState();
}

function saveToFavorites() {
  const results = state.module === 1 ? state.m1Results : state.m2Results;
  const entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    module: state.module,
    results: JSON.parse(JSON.stringify(results)),
    ts: Date.now(),
    notes: ''
  };
  state.favorites['待画清单'].push(entry);
  saveState();
  showToast('已添加到待画清单');
}

function restoreHistory(idx) {
  const item = state.history[idx];
  if (!item) return;
  state.module = item.module;
  if (item.module === 1) {
    state.m1Results = JSON.parse(JSON.stringify(item.results));
    state.m1Flipped = {};
    Object.keys(state.m1Results).forEach(k => { state.m1Flipped[k] = true; });
    state.m1Locks = {};
    // Force show all dimensions from restored result (overrides user filter)
    state.m1Dims = Object.keys(state.m1Results);
  } else {
    state.m2Results = JSON.parse(JSON.stringify(item.results));
    state.m2Flipped = {};
    Object.keys(state.m2Results).forEach(k => { state.m2Flipped[k] = true; });
    state.m2Locks = {};
  }
  state.page = 'home';
  renderApp();
  showToast('已还原结果');
}

// ============================================================
//  SHARE CARD
// ============================================================

function generateShareCard() {
  const canvas = document.getElementById('shareCanvas');
  const ctx = canvas.getContext('2d');
  const results = state.module === 1 ? state.m1Results : state.m2Results;
  const accentColor = state.module === 1 ? '#8B6914' : '#6B1D2F';
  const padding = 50;
  const maxWidth = 600 - padding * 2;

  // Set font first so we can measure
  ctx.font = 'italic 300 30px "STKaiti", "KaiTi", "Georgia", "Times New Roman", serif';

  // Build and filter word list — drop words that overflow
  let allWords = [];
  if (state.module === 1) {
    allWords = Object.values(results).filter(w => w && w !== '（词库为空）');
  } else {
    const charResult = results['角色'];
    const charName = charResult && typeof charResult === 'object' ? charResult.name : (charResult || '');
    if (charName) allWords.push(charName);
    ['错位年代', '错位地点', '情境'].forEach(t => {
      if (results[t] && results[t] !== '（词库为空）') allWords.push(results[t]);
    });
  }
  const words = allWords.filter(w => ctx.measureText(w).width <= maxWidth);

  // Layout
  const lineHeight = 52;
  const startY = 60;
  canvas.width = 600;
  canvas.height = Math.max(300, startY + words.length * lineHeight + 80);

  // Light brown paper background
  const bgColor = '#D9C7B0';
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Subtle grain texture
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < imageData.data.length; i += 4) {
    const noise = (Math.random() - 0.5) * 10;
    imageData.data[i] += noise;
    imageData.data[i + 1] += noise;
    imageData.data[i + 2] += noise;
  }
  ctx.putImageData(imageData, 0, 0);

  // Flowing gold border lines
  const bm = 16; // border margin
  ctx.strokeStyle = 'rgba(180,140,50,0.45)';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  // Outer frame
  ctx.beginPath();
  ctx.roundRect(bm, bm, canvas.width - bm * 2, canvas.height - bm * 2, 4);
  ctx.stroke();
  // Inner flowing line — dashed gold
  ctx.strokeStyle = 'rgba(180,140,50,0.28)';
  ctx.lineWidth = 0.6;
  ctx.setLineDash([6, 14]);
  ctx.lineDashOffset = 3;
  ctx.beginPath();
  ctx.roundRect(bm + 8, bm + 8, canvas.width - (bm + 8) * 2, canvas.height - (bm + 8) * 2, 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Words — thin flowing font, left aligned
  ctx.fillStyle = accentColor;
  ctx.font = 'italic 300 30px "STKaiti", "KaiTi", "Georgia", "Times New Roman", serif';
  ctx.textAlign = 'left';
  words.forEach((word, i) => {
    const y = startY + i * lineHeight;
    ctx.fillText(word, padding, y);
  });

  // Watermark — matching wood tone, thin flowing font
  ctx.fillStyle = 'rgba(120,100,70,0.45)';
  ctx.font = 'italic 300 22px "STKaiti", "KaiTi", "Georgia", "Times New Roman", serif';
  ctx.textAlign = 'right';
  ctx.fillText('Cpaintz', canvas.width - 40, canvas.height - 25);

  return canvas;
}

function showShareModal() {
  generateShareCard();
  document.getElementById('shareModal').classList.add('visible');
}

function saveShareImage() {
  const canvas = generateShareCard();
  const link = document.createElement('a');
  link.download = `cpaintz_${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('图片已保存');
}

let parsedWords = [];

function updateDictDimSelect() {
  const module = parseInt(document.getElementById('dictModule').value);
  const select = document.getElementById('dictDim');
  if (module === 1) {
    select.innerHTML = M1_DIM_NAMES.map(d => `<option value="${d}">${d}</option>`).join('');
  } else {
    const dims = ['错位年代','错位地点','情境'];
    select.innerHTML = dims.map(d => `<option value="${d}">${d}</option>`).join('');
  }
  parsedWords = [];
  document.getElementById('dictParsed').innerHTML = '';
  document.getElementById('dictPaste').value = '';
}

function parseWords() {
  const raw = document.getElementById('dictPaste').value.trim();
  if (!raw) { showToast('请先粘贴词条'); return; }
  const split = raw.split(/[\n,，、\s]+/).filter(w => w.trim().length > 0);
  const module = parseInt(document.getElementById('dictModule').value);
  const dim = document.getElementById('dictDim').value;
  const dictKey = module === 1 ? 'module1' : 'module2';
  const existingCustom = state.customDict[dictKey][dim] || [];
  const defaults = DEFAULT_DICT[dictKey][dim] || [];
  const defaultFlat = typeof defaults === 'object' && !Array.isArray(defaults)
    ? Object.values(defaults).flat() : defaults;

  parsedWords = split.map(w => ({
    word: w.trim(),
    isDefault: defaultFlat.includes(w.trim()),
    isExisting: existingCustom.includes(w.trim())
  }));

  document.getElementById('dictParsed').innerHTML = parsedWords.map((pw, i) => {
    let cls = '';
    if (pw.isDefault) cls = 'style="background:#DDD;color:#999;" title="系统默认词，不可编辑"';
    else if (pw.isExisting) cls = 'class="custom" title="已在自定义词库中"';
    return `<span class="parsed-word" ${cls}>${pw.word}${!pw.isDefault ? `<button data-idx="${i}" class="pw-del">×</button>` : ''}</span>`;
  }).join('');
}

function saveCustomWords() {
  const module = parseInt(document.getElementById('dictModule').value);
  const dim = document.getElementById('dictDim').value;
  const dictKey = module === 1 ? 'module1' : 'module2';

  const newWords = parsedWords.filter(pw => !pw.isDefault).map(pw => pw.word);
  if (!state.customDict[dictKey]) state.customDict[dictKey] = {};
  if (!state.customDict[dictKey][dim]) state.customDict[dictKey][dim] = [];

  // Merge with existing
  const existing = state.customDict[dictKey][dim];
  newWords.forEach(w => { if (!existing.includes(w)) existing.push(w); });

  saveState();
  showToast(`已添加 ${newWords.length} 个词条到「${dim}」`);
  parsedWords = [];
  document.getElementById('dictParsed').innerHTML = '';
  document.getElementById('dictPaste').value = '';

  // Refresh cards if on home
  if (state.page === 'home') {
    if (state.module === 1) { drawModule1(); renderModule1(); }
    else { drawModule2(); renderModule2(); }
  }
}

function resetCustomDict() {
  state.customDict = { module1: {}, module2: {} };
  saveState();
  showToast('已恢复默认词库');
  if (state.page === 'home') {
    if (state.module === 1) { drawModule1(); renderModule1(); }
    else { drawModule2(); renderModule2(); }
  }
}

function renderApp() {
  // Pages
  document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
  const pageEl = document.getElementById(`page-${state.page}`);
  if (pageEl) pageEl.classList.add('visible');

  renderNav();

  switch (state.page) {
    case 'home': renderHome(); break;
    case 'favorites': renderFavorites(); break;
    case 'history': renderHistory(); break;
    case 'settings': renderSettings(); break;
  }
}

// ============================================================
//  EVENT DELEGATION
// ============================================================

document.addEventListener('click', e => {
  // Nav links
  const navBtn = e.target.closest('nav .nav-links button');
  if (navBtn) {
    state.page = navBtn.dataset.page;
    renderApp();
    return;
  }

  // Sound toggle (nav)
  if (e.target.closest('#soundToggle')) {
    state.soundEnabled = !state.soundEnabled;
    saveState();
    renderNav();
    showToast(state.soundEnabled ? '音效已开启' : '音效已静音');
    return;
  }

  // Module tabs
  const modBtn = e.target.closest('.module-tabs button');
  if (modBtn) {
    const newModule = parseInt(modBtn.dataset.module);
    if (newModule !== state.module) {
      state.module = newModule;
      if (newModule === 1) { state.m1Results = {}; state.m1Locks = {}; state.m1Flipped = {}; }
      else { state.m2Results = {}; state.m2Locks = {}; state.m2Flipped = {}; }
      renderHome();
    }
    return;
  }

  // Module 1 — dim tag toggle
  const dimTag = e.target.closest('.dim-tag');
  if (dimTag) {
    const dim = dimTag.dataset.dim;
    if (state.m1Dims.includes(dim)) {
      if (state.m1Dims.length <= 2) { showToast('至少保留2个维度'); return; }
      state.m1Dims = state.m1Dims.filter(d => d !== dim);
      delete state.m1Results[dim];
      delete state.m1Locks[dim];
      delete state.m1Flipped[dim];
    } else {
      state.m1Dims.push(dim);
    }
    drawModule1();
    renderModule1();
    saveState();
    return;
  }

  // Card click — goes through double-click detection timer
  const cardInner = e.target.closest('.card-inner');
  if (cardInner) {
    const inM1 = cardInner.closest('#m1Cards');
    const inM2 = cardInner.closest('#m2Cards');
    if (inM1 || inM2) {
      handleCardClick(cardInner);
      return;
    }
  }

  // Module 1 actions
  if (e.target.closest('#m1Refresh')) { refreshAll(1); return; }
  if (e.target.closest('#m1Save')) { saveToFavorites(); return; }
  if (e.target.closest('#m1Unlock')) { unlockAll(1); return; }
  if (e.target.closest('#m1Share')) { showShareModal(); return; }

  // Module 2 actions
  if (e.target.closest('#m2Refresh')) { refreshAll(2); return; }
  if (e.target.closest('#m2Save')) { saveToFavorites(); return; }
  if (e.target.closest('#m2Unlock')) { unlockAll(2); return; }
  if (e.target.closest('#m2Share')) { showShareModal(); return; }

  // Series filter
  const seriesTag = e.target.closest('.series-tag');
  if (seriesTag) {
    const s = seriesTag.dataset.series;
    if (state.m2Series.length === 0) {
      // All selected → select only this one
      state.m2Series = [s];
    } else if (state.m2Series.includes(s)) {
      state.m2Series = state.m2Series.filter(x => x !== s);
    } else {
      state.m2Series.push(s);
    }
    drawModule2();
    renderModule2();
    saveState();
    return;
  }

  // History — click to restore
  const histInfo = e.target.closest('.hist-info');
  if (histInfo) {
    restoreHistory(parseInt(histInfo.dataset.idx));
    return;
  }
  // History — delete
  const histDel = e.target.closest('.hist-del-btn');
  if (histDel) {
    const idx = parseInt(histDel.dataset.idx);
    state.history.splice(idx, 1);
    saveState();
    renderHistory();
    showToast('已删除');
    return;
  }

  // Favorites — delete
  const favDel = e.target.closest('.fav-del-btn');
  if (favDel) {
    const group = favDel.dataset.group;
    const id = favDel.dataset.id;
    state.favorites[group] = state.favorites[group].filter(i => i.id !== id);
    saveState();
    renderFavorites();
    showToast('已删除');
    return;
  }

  // Favorites — move menu
  const favMove = e.target.closest('.fav-move-btn');
  if (favMove) {
    e.stopPropagation();
    // Remove any existing menu
    document.querySelectorAll('.fav-move-menu').forEach(m => m.remove());
    const id = favMove.dataset.id;
    const currentGroup = favMove.dataset.group;
    const menu = document.createElement('div');
    menu.className = 'fav-move-menu';
    ['待画清单', '已完成', '灵感存档'].forEach(g => {
      const btn = document.createElement('button');
      btn.textContent = g === currentGroup ? `✓ ${g}` : g;
      if (g === currentGroup) btn.classList.add('current');
      btn.addEventListener('click', ev => {
        ev.stopPropagation();
        if (g === currentGroup) return;
        // Move item
        let item = null;
        for (const src of Object.keys(state.favorites)) {
          const idx = state.favorites[src].findIndex(i => i.id === id);
          if (idx !== -1) { item = state.favorites[src].splice(idx, 1)[0]; break; }
        }
        if (item) {
          state.favorites[g].push(item);
          saveState();
          renderFavorites();
          showToast(`已移至「${g}」`);
        }
        menu.remove();
      });
      menu.appendChild(btn);
    });
    favMove.parentElement.appendChild(menu);
    return;
  }

  // Close move menu on outside click
  if (!e.target.closest('.fav-move-btn') && !e.target.closest('.fav-move-menu')) {
    document.querySelectorAll('.fav-move-menu').forEach(m => m.remove());
  }

  // Favorites — note
  const favNote = e.target.closest('.fav-note-btn');
  if (favNote) {
    const id = favNote.dataset.id;
    let item = null, group = null;
    for (const g of Object.keys(state.favorites)) {
      item = state.favorites[g].find(i => i.id === id);
      if (item) { group = g; break; }
    }
    if (item) {
      const note = prompt('添加备注：', item.notes || '');
      if (note !== null) {
        item.notes = note;
        saveState();
        renderFavorites();
      }
    }
    return;
  }

  // Settings — sound
  if (e.target.closest('#settingSound')) {
    state.soundEnabled = document.getElementById('settingSound').checked;
    saveState();
    renderNav();
    return;
  }

  // Settings — open custom dict
  if (e.target.closest('#openDictBtn')) {
    updateDictDimSelect();
    document.getElementById('dictModal').classList.add('visible');
    return;
  }

  // Dict modal — close
  if (e.target.closest('#dictClose')) {
    document.getElementById('dictModal').classList.remove('visible');
    return;
  }

  // Dict modal — parse
  if (e.target.closest('#dictParse')) { parseWords(); return; }

  // Dict modal — save
  if (e.target.closest('#dictSave')) { saveCustomWords(); return; }

  // Dict modal — reset
  if (e.target.closest('#dictReset')) {
    if (confirm('确定要恢复默认词库吗？所有自定义词条将被清除。')) resetCustomDict();
    return;
  }

  // Dict modal — parsed word delete
  const pwDel = e.target.closest('.pw-del');
  if (pwDel) {
    const idx = parseInt(pwDel.dataset.idx);
    parsedWords.splice(idx, 1);
    // Re-render parsed
    const parsedDiv = document.getElementById('dictParsed');
    parsedDiv.innerHTML = parsedWords.map((pw, i) => {
      let cls = '';
      if (pw.isDefault) cls = 'style="background:#DDD;color:#999;"';
      else if (pw.isExisting) cls = 'class="custom"';
      return `<span class="parsed-word" ${cls}>${pw.word}${!pw.isDefault ? `<button data-idx="${i}" class="pw-del">×</button>` : ''}</span>`;
    }).join('');
    return;
  }

  // Dict module change
  if (e.target.closest('#dictModule')) { updateDictDimSelect(); return; }

  // Share modal — close
  if (e.target.closest('#shareClose')) {
    document.getElementById('shareModal').classList.remove('visible');
    return;
  }

  // Share modal — save
  if (e.target.closest('#shareSave')) { saveShareImage(); return; }

  // Modal overlay click to close
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('visible');
    return;
  }
});

// ============================================================
//  CARD INTERACTION — click/dblclick/long-press
// ============================================================

let cardClickTimer = null;
let pendingCardClick = null;
let longPressTimer = null;
let longPressFired = false;

function getCardKey(cardInner) {
  return cardInner.dataset.dim || cardInner.dataset.type;
}

function handleCardSingleClick(module, key) {
  if (module === 1) {
    if (!state.m1Flipped[key]) {
      // Flip — DOM manipulation for 3D animation
      state.m1Flipped[key] = true;
      playSound('flip');
      const card = document.querySelector(`#m1Cards .card-inner[data-dim="${CSS.escape(key)}"]`);
      if (card) card.classList.add('flipped');
      if (state.m1Dims.every(d => state.m1Flipped[d])) saveToHistory();
    } else if (!state.m1Locks[key]) {
      // Redraw — update text + pulse animation
      const words = getWords(key, 1);
      state.m1Results[key] = words.length > 0 ? randomPick(words) : '（词库为空）';
      playSound('redraw');
      const wordEl = document.querySelector(`#m1Cards .card-inner[data-dim="${CSS.escape(key)}"] .card-word`);
      if (wordEl) {
        wordEl.textContent = state.m1Results[key];
        const inner = wordEl.closest('.card-inner');
        inner.classList.add('redrawing');
        setTimeout(() => inner.classList.remove('redrawing'), 350);
      }
    }
  } else {
    if (!state.m2Flipped[key]) {
      state.m2Flipped[key] = true;
      playSound('flip');
      const card = document.querySelector(`#m2Cards .card-inner[data-type="${CSS.escape(key)}"]`);
      if (card) card.classList.add('flipped');
      if (M2_CARD_TYPES.every(t => state.m2Flipped[t])) saveToHistory();
    } else if (!state.m2Locks[key]) {
      playSound('redraw');
      const inner = document.querySelector(`#m2Cards .card-inner[data-type="${CSS.escape(key)}"]`);
      const wordEl = inner ? inner.querySelector('.card-word') : null;
      const tagEl = inner ? inner.querySelector('.card-tag') : null;
      if (key === '角色') {
        const chars = getAvailableCharacters();
        state.m2Results[key] = chars.length > 0 ? randomPick(chars) : { name: '（无可用角色）', series: '', type: 'single' };
        if (wordEl) wordEl.textContent = state.m2Results[key].name;
        if (tagEl) tagEl.textContent = state.m2Results[key].series || key;
      } else if (key === '情境') {
        state.m2Results[key] = weightedSituation(state.m2Emotion);
        if (wordEl) wordEl.textContent = state.m2Results[key];
      } else {
        const w = getWords(key, 2);
        state.m2Results[key] = w.length > 0 ? randomPick(w) : '（词库为空）';
        if (wordEl) wordEl.textContent = state.m2Results[key];
      }
      if (inner) {
        inner.classList.add('redrawing');
        setTimeout(() => inner.classList.remove('redrawing'), 350);
      }
    }
  }
}

function handleCardDoubleClick(module, key) {
  if (module === 1) {
    if (state.m1Flipped[key]) {
      state.m1Locks[key] = !state.m1Locks[key];
      showToast(state.m1Locks[key] ? '🔒 已锁定' : '🔓 已解锁');
      const card = document.querySelector(`#m1Cards .card-inner[data-dim="${CSS.escape(key)}"]`);
      if (card) card.classList.toggle('locked', state.m1Locks[key]);
    }
  } else {
    if (state.m2Flipped[key]) {
      state.m2Locks[key] = !state.m2Locks[key];
      showToast(state.m2Locks[key] ? '🔒 已锁定' : '🔓 已解锁');
      const card = document.querySelector(`#m2Cards .card-inner[data-type="${CSS.escape(key)}"]`);
      if (card) card.classList.toggle('locked', state.m2Locks[key]);
    }
  }
}

function handleCardClick(cardInner) {
  if (longPressFired) { longPressFired = false; return; }

  const module = cardInner.closest('#m1Cards') ? 1 : 2;
  const key = getCardKey(cardInner);
  if (!key) return;

  if (cardClickTimer) {
    // Second click within 280ms = double-click → toggle lock
    clearTimeout(cardClickTimer);
    cardClickTimer = null;
    pendingCardClick = null;
    handleCardDoubleClick(module, key);
  } else {
    pendingCardClick = { module, key };
    cardClickTimer = setTimeout(() => {
      cardClickTimer = null;
      if (pendingCardClick) {
        handleCardSingleClick(pendingCardClick.module, pendingCardClick.key);
        pendingCardClick = null;
      }
    }, 280);
  }
}

// Mobile long-press → toggle lock (same as desktop double-click)
document.addEventListener('touchstart', e => {
  const cardInner = e.target.closest('.card-inner');
  if (!cardInner) return;
  const inM1 = cardInner.closest('#m1Cards');
  const inM2 = cardInner.closest('#m2Cards');
  if (!inM1 && !inM2) return;

  longPressFired = false;
  longPressTimer = setTimeout(() => {
    longPressFired = true;
    const module = cardInner.closest('#m1Cards') ? 1 : 2;
    const key = getCardKey(cardInner);
    if (key) handleCardDoubleClick(module, key);
  }, 600);
}, { passive: true });

document.addEventListener('touchend', () => {
  clearTimeout(longPressTimer);
});
document.addEventListener('touchmove', () => {
  clearTimeout(longPressTimer);
});

// ============================================================
//  EMOTION SLIDER
// ============================================================

document.getElementById('emotionSlider').addEventListener('input', e => {
  state.m2Emotion = parseInt(e.target.value);
  saveState();
  // Don't auto-update cards — user clicks to redraw after sliding
});

// ============================================================
//  INIT
// ============================================================

function init() {
  loadState();
  renderApp();

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }
}

init();
</script>
